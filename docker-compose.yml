services:
  giwicd:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: giwicd
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env.docker
    environment:
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - PORT=${PORT:-3000}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:4200}
      - NODE_ENV=production
    volumes:
      - giwicd-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  giwicd-data:
